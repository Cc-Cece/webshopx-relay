<!doctype html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <title data-i18n="uiText.page.title">WebShopX Help</title>
  <script>
    (function () {
      try {
        var saved = window.localStorage.getItem("webshopx_theme");
        var theme = saved === "dark" || saved === "light"
          ? saved
          : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.classList.remove("light", "dark");
        document.documentElement.classList.add(theme);
      } catch (error) {
        document.documentElement.classList.remove("dark");
        document.documentElement.classList.add("light");
      }
    })();
  </script>
  <script src="config.js"></script>
  <link rel="stylesheet" href="css/light.css" />
  <link rel="stylesheet" href="css/dark.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="vendor/katex.min.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    .help-shell {
      width: min(1320px, calc(100vw - 16px));
      margin: 8px auto 14px;
      display: grid;
      gap: 10px;
    }

    .help-header {
      position: sticky;
      top: 8px;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      background: color-mix(in srgb, var(--app-card-raised-bg) 86%, transparent);
      backdrop-filter: blur(12px);
    }

    .help-header h1 {
      margin: 0;
      font-size: clamp(18px, 2.2vw, 26px);
    }

    .help-header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .help-menu-btn {
      display: none;
      min-height: 38px;
      white-space: nowrap;
    }

    .help-doc-select,
    .help-search-input {
      border: 1px solid var(--md-sys-color-outline-variant);
      background: var(--md-sys-color-surface-container-low);
      color: var(--md-sys-color-on-surface);
      border-radius: 10px;
      min-height: 38px;
      font-size: 13px;
      padding: 0 10px;
    }

    .help-doc-select {
      min-width: 200px;
      max-width: 360px;
      width: min(360px, 100%);
    }

    .help-layout {
      display: grid;
      gap: 10px;
      grid-template-columns: minmax(220px, 290px) minmax(0, 1fr);
      align-items: start;
    }

    .help-nav {
      position: sticky;
      top: 88px;
      max-height: calc(100vh - 102px);
      overflow: auto;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .help-nav h2 {
      margin: 0;
      font-size: 15px;
    }

    .help-nav-tools {
      display: grid;
      gap: 8px;
    }

    .help-search-input {
      width: 100%;
      outline: none;
    }

    .help-search-input:focus {
      border-color: var(--md-sys-color-primary);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--md-sys-color-primary) 16%, transparent);
    }

    .help-search-results {
      display: grid;
      gap: 4px;
      max-height: 224px;
      overflow: auto;
    }

    .search-result-item {
      display: grid;
      gap: 2px;
      text-align: left;
      border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: 9px;
      padding: 7px 9px;
      background: var(--md-sys-color-surface-container-low);
      color: var(--md-sys-color-on-surface);
      cursor: pointer;
      font-size: 12px;
      min-height: auto;
    }

    .search-result-item:hover {
      border-color: var(--md-sys-color-primary);
    }

    .search-result-main {
      color: var(--md-sys-color-on-surface);
      font-weight: 700;
    }

    .search-result-sub,
    .help-search-empty {
      color: var(--md-sys-color-on-surface-variant);
      font-size: 11px;
    }

    .toc {
      display: grid;
      gap: 2px;
    }

    .toc-link {
      display: block;
      color: var(--md-sys-color-on-surface-variant);
      text-decoration: none;
      font-size: 13px;
      border-left: 2px solid transparent;
      padding: 6px 8px;
      border-radius: 6px;
      transition: background 0.16s ease, color 0.16s ease, border-color 0.16s ease;
    }

    .toc-link:hover {
      color: var(--md-sys-color-on-surface);
      background: var(--md-sys-color-surface-container-low);
    }

    .toc-link.level-3 {
      padding-left: 16px;
      font-size: 12px;
    }

    .toc-link.level-4 {
      padding-left: 24px;
      font-size: 12px;
    }

    .toc-link.active {
      color: var(--md-sys-color-primary);
      border-color: var(--md-sys-color-primary);
      background: color-mix(in srgb, var(--md-sys-color-primary-container) 40%, transparent);
      font-weight: 700;
    }

    .help-doc {
      padding: 14px 16px;
      min-height: calc(100vh - 120px);
      min-width: 0;
    }

    .help-content {
      min-width: 0;
    }

    .help-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
      color: var(--md-sys-color-on-surface-variant);
      font-size: 12px;
    }

    .help-content h1,
    .help-content h2,
    .help-content h3,
    .help-content h4,
    .help-content h5,
    .help-content h6 {
      color: var(--md-sys-color-on-surface);
      line-height: 1.32;
      margin: 16px 0 8px;
      scroll-margin-top: 100px;
    }

    .help-content h1 {
      margin-top: 0;
      font-size: 30px;
    }

    .help-content h2 {
      font-size: 24px;
      border-bottom: 1px solid var(--md-sys-color-outline-variant);
      padding-bottom: 5px;
    }

    .help-content h3 {
      font-size: 19px;
    }

    .help-content h4 {
      font-size: 17px;
    }

    .help-content p,
    .help-content li,
    .help-content blockquote,
    .help-content td,
    .help-content th {
      color: var(--md-sys-color-on-surface-variant);
      font-size: 14px;
      line-height: 1.7;
      overflow-wrap: anywhere;
    }

    .help-content ul,
    .help-content ol {
      margin: 8px 0 14px;
      padding-left: 22px;
    }

    .help-content code {
      background: color-mix(in srgb, var(--md-sys-color-primary-container) 26%, transparent);
      color: var(--md-sys-color-primary);
      border-radius: 6px;
      padding: 1px 6px;
      font-size: 12px;
    }

    .help-content pre {
      margin: 10px 0 14px;
      max-height: 360px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 10px;
      border: 1px solid var(--md-sys-color-outline-variant);
      background: var(--md-sys-color-surface-container-low);
      padding: 12px;
    }

    .help-content pre code {
      background: transparent;
      color: var(--md-sys-color-on-surface);
      padding: 0;
      font-size: 12px;
      line-height: 1.5;
    }

    .help-content blockquote {
      margin: 10px 0;
      padding: 8px 12px;
      border-left: 3px solid var(--md-sys-color-primary);
      background: color-mix(in srgb, var(--md-sys-color-primary-container) 24%, transparent);
      border-radius: 6px;
    }

    .help-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0 14px;
      border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: 9px;
      overflow: hidden;
    }

    .help-content th,
    .help-content td {
      border-bottom: 1px solid var(--md-sys-color-outline-variant);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }

    .help-content tr:last-child td {
      border-bottom: none;
    }

    .help-content a {
      color: var(--md-sys-color-primary);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .help-empty {
      margin: 12px 0;
      color: var(--app-danger-fg);
      font-size: 13px;
    }

    .doc-section[hidden] {
      display: none !important;
    }

    .doc-section {
      animation: helpFadeIn 0.2s ease;
    }

    @keyframes helpFadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 980px) {
      .help-shell {
        width: calc(100vw - 12px);
        gap: 8px;
      }

      .help-layout {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .help-nav {
        position: static;
        max-height: none;
        order: 2;
      }

      .help-header {
        top: 0;
        padding: 10px 12px;
      }

      .help-doc {
        min-height: auto;
        order: 1;
      }

      .help-header-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .help-doc-select {
        min-width: 0;
        max-width: none;
        width: 100%;
      }
    }

    @media (max-width: 760px) {
      .help-header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
      }

      .help-header h1 {
        font-size: clamp(17px, 5.3vw, 22px);
      }

      .help-menu-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .help-header-actions {
        display: none;
        grid-column: 1 / -1;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .help-shell.menu-open .help-header-actions {
        display: grid;
      }

      .help-header-actions > * {
        width: 100%;
      }

      .help-doc-select {
        grid-column: auto;
      }

      .help-doc {
        padding: 12px;
        order: 2;
      }

      .help-nav {
        order: 1;
        padding: 10px;
      }

      .help-nav h2,
      .help-nav .toc {
        display: none;
      }

      .help-nav-tools {
        gap: 6px;
      }

      .help-content h1 {
        font-size: 24px;
      }

      .help-content h2 {
        font-size: 20px;
      }

      .help-content h3 {
        font-size: 17px;
      }

      .help-content p,
      .help-content li,
      .help-content blockquote,
      .help-content td,
      .help-content th {
        font-size: 13px;
        line-height: 1.65;
      }

      .help-content pre {
        padding: 10px;
      }
    }

    @media (max-width: 520px) {
      .help-shell {
        width: calc(100vw - 8px);
      }

      .help-header {
        top: 0;
        padding: 9px 10px;
      }

      .help-meta {
        font-size: 11px;
      }

      .toc-link {
        font-size: 12px;
        padding: 8px 8px;
      }
    }
  </style>
</head>
<body>
  <main class="help-shell">
    <header class="md-card help-header">
      <div>
        <h1 data-i18n="uiText.page.headerTitle">WebShopX Help Center</h1>
      </div>
      <button
        id="helpMenuBtn"
        class="btn-tonal help-menu-btn"
        type="button"
        aria-label="Open menu"
        data-i18n-aria-label="uiText.page.menuAria"
        aria-expanded="false"
        aria-controls="helpHeaderActions"
        data-i18n="uiText.page.menuBtn"
      >Menu</button>
      <div id="helpHeaderActions" class="help-header-actions">
        <button
          class="btn-tonal"
          type="button"
          onclick="window.open('https://docs.akihito.dpdns.org/', '_blank', 'noopener,noreferrer')"
          data-i18n="uiText.page.onlineDocsBtn"
        >Online Docs</button>
        <button id="helpHomeBtn" class="btn-tonal btn-return" type="button" data-i18n="uiText.page.homeBtn">Back Home</button>
        <select id="helpDocSelect" class="help-doc-select" title="Document picker" data-i18n-title="uiText.page.docSelectTitle"></select>
        <button id="helpModeToggleBtn" class="btn-tonal" type="button" data-i18n="uiText.page.modeToggleFull">Single Page</button>
        <button id="helpThemeToggleBtn" class="btn-tonal" type="button" data-i18n="uiText.page.themeToggleDark">Dark mode</button>
        <button id="helpReloadBtn" class="btn-tonal" type="button" data-i18n="uiText.page.reloadBtn">Reload</button>
      </div>
    </header>

    <div class="help-layout">
      <aside class="md-card help-nav">
        <h2 data-i18n="uiText.page.tocTitle">Contents</h2>
        <div class="help-nav-tools">
          <input
            id="helpSearchInput"
            class="help-search-input"
            type="search"
            placeholder="Search headings/content (local)"
            data-i18n-placeholder="uiText.page.searchPlaceholder"
            autocomplete="off"
          />
          <div id="helpSearchResults" class="help-search-results" aria-live="polite"></div>
        </div>
        <nav id="helpToc" class="toc" aria-label="Help contents" data-i18n-aria-label="uiText.page.tocAria"></nav>
      </aside>

      <article class="md-card help-doc">
        <div id="helpMeta" class="help-meta"></div>
        <div id="helpContent" class="help-content"></div>
      </article>
    </div>
  </main>

  <script src="vendor/marked.min.js"></script>
  <script src="vendor/purify.min.js"></script>
  <script src="vendor/katex.min.js"></script>
  <script src="vendor/auto-render.min.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/help.js"></script>
</body>
</html>
